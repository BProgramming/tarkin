name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install build dependencies
        run: pip install build cyclonedx-bom

      - name: Build
        run: SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct) python -m build

      - name: Generate SBOM from uv.lock
        # Export the pinned lockfile to requirements format, then generate
        # a reproducible CycloneDX SBOM from that. This reflects the exact
        # declared dependency tree from uv.lock rather than the installed
        # environment, which varies by runner image.
        run: |
          uv export --frozen --no-dev --format requirements-txt > requirements.lock.txt
          cyclonedx-py requirements --of JSON -o sbom.json requirements.lock.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-sbom:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Attach SBOM to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json
